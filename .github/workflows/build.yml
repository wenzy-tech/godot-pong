name: Build Godot HTML5 Game

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libgl1-mesa-dri libasound2 curl unzip

      - name: Download Godot 4.6.2 Linux headless binary
        run: |
          curl -L -o godot.zip \
            https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          unzip -o godot.zip -d godot-bin/
          chmod +x godot-bin/Godot_v4.6.2-stable_linux.x86_64

      - name: Download Godot 4.6.2 export templates
        run: |
          mkdir -p ~/.local/share/godot/templates/4.6.2.stable
          curl -L -o /tmp/templates.tpz \
            https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz
          unzip -o /tmp/templates.tpz -d /tmp/templates_dir/
          cp -r /tmp/templates_dir/templates/* \
             ~/.local/share/godot/templates/4.6.2.stable/

      - name: Clean and rebuild
        run: |
          rm -rf .import
          rm -rf .godot
          rm -rf pong/
          mkdir -p pong

      - name: Convert project to Godot 4.x format
        run: |
          # Godot 4 needs the project.gdns file adjusted
          # First, just try to open and resave in Godot 4 format
          DISPLAY=:99 xvfb-run --server-args="-screen 0 1024x768x24" \
            godot-bin/Godot_v4.6.2-stable_linux.x86_64 \
            --path . --headless --export-release "HTML5" pong/index.html || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: godot-pong-html5
          path: pong/
          retention-days: 7

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pong
          publish_branch: gh-pages
