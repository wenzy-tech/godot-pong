name: Build Godot HTML5 Game

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: firebelley/godot-ci@v1
        with:
          godot-version: 3.5.2-stable
          android-sdk-version: ""

      - name: Build HTML5 export with xvfb
        run: |
          mkdir -p pong
          xvfb-run --server-args="-screen 0 1024x768x24" \
            /opt/godot/bin/Godot_v3.5.2-stable_linux.headless \
            --path . --headless --export "HTML5" pong/index.html

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: godot-pong-html5
          path: pong/
          retention-days: 7

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pong
          publish_branch: gh-pages
