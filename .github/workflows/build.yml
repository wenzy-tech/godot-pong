name: Build Godot HTML5 Game

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libgl1-mesa-dri libasound2 curl unzip

      - name: Download Godot 4.6.2 Linux headless binary
        run: |
          curl -L -o godot.zip \
            https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          unzip -o godot.zip -d godot-bin/
          chmod +x godot-bin/Godot_v4.6.2-stable_linux.x86_64

      - name: Download Godot 4.6.2 export templates
        run: |
          mkdir -p ~/.local/share/godot/templates/4.6.2.stable
          curl -L -o /tmp/templates.tpz \
            https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz
          unzip -o /tmp/templates.tpz -d /tmp/templates_dir/
          cp -r /tmp/templates_dir/templates/* \
             ~/.local/share/godot/templates/4.6.2.stable/

      - name: Clean and rebuild
        run: |
          rm -rf .import
          rm -rf .godot
          rm -rf pong/
          mkdir -p pong

      - name: Export HTML5
        run: |
          DISPLAY=:99 xvfb-run --server-args="-screen 0 1024x768x24" \
            godot-bin/Godot_v4.6.2-stable_linux.x86_64 \
            --path . --headless --export-release "Web" pong/index.html

      - name: Verify build output
        run: |
          echo "Checking build files..."
          ls -la pong/
          if [ ! -f pong/index.wasm ] || [ ! -s pong/index.wasm ]; then
            echo "ERROR: index.wasm is missing or empty"
            exit 1
          fi
          if [ ! -f pong/index.pck ] || [ ! -s pong/index.pck ]; then
            echo "ERROR: index.pck is missing or empty"
            exit 1
          fi
          echo "Build files verified OK"
          echo "index.wasm: $(stat -c%s pong/index.wasm) bytes"
          echo "index.pck: $(stat -c%s pong/index.pck) bytes"

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd pong
          git init
          git config user.name "github-actions[bot]" 
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${{ github.event.head_commit.id }} $(git log -1 --pretty=%s)"
          git push -f https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:gh-pages
